name: DMBC Extras CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install PHP_CodeSniffer and WPCS
        run: |
          composer global require "squizlabs/php_codesniffer=*"
          git clone -b master https://github.com wpcs
          phpcs --config-set installed_paths $(pwd)/wpcs

      - name: Run PHPCS Linting
        run: phpcs --standard=WordPress-Core ./ -v

  phpunit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        php-versions: ['8.1', '8.2', '8.3']
        wp-versions: ['latest', 'nightly']
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mysql, mysqli, gd
          tools: phpunit

      - name: Start MySQL Service
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE wordpress_tests;"

      - name: Install WordPress Test Suite
        run: |
          # Installs the official test suite tools into a temporary directory
          bash bin/install-wp-tests.sh wordpress_tests root root localhost ${{ matrix.wp-versions }}

      - name: Run Unit Tests
        run: phpunit